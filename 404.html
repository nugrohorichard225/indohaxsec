<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | IndoHaxSec.one — Access Denied</title>
  <meta name="description" content="404 - Halaman tidak ditemukan. IndoHaxSec.one">
  <meta name="theme-color" content="#050505">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hax-dark': '#050505',
            'hax-green': '#00FF41',
            'hax-cyan': '#00FFFF',
            'hax-magenta': '#FF00FF',
            'hax-red': '#FF0033',
          },
          fontFamily: {
            'terminal': ['"VT323"', 'monospace'],
            'mono': ['"Space Mono"', 'monospace'],
            'cyber': ['"Orbitron"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050505;
      color: #c0c0c0;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      height: 100vh;
    }
    ::selection { background: #FF0033; color: #050505; }

    /* Scanlines */
    .scanlines::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.015) 2px, rgba(0,255,65,0.015) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    /* Glitch 404 */
    .glitch-404 {
      position: relative;
      display: inline-block;
      animation: shift 4s ease-in-out infinite alternate;
    }
    .glitch-404::before,
    .glitch-404::after {
      content: '404';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .glitch-404::before {
      color: #00FFFF;
      animation: glitch-1 0.3s infinite linear alternate-reverse;
      clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
    }
    .glitch-404::after {
      color: #FF00FF;
      animation: glitch-2 0.3s infinite linear alternate-reverse;
      clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%);
    }
    @keyframes glitch-1 {
      0% { transform: translate(0); }
      20% { transform: translate(-4px, 2px); }
      40% { transform: translate(-4px, -2px); }
      60% { transform: translate(4px, 2px); }
      80% { transform: translate(4px, -2px); }
      100% { transform: translate(0); }
    }
    @keyframes glitch-2 {
      0% { transform: translate(0); }
      20% { transform: translate(4px, -2px); }
      40% { transform: translate(4px, 2px); }
      60% { transform: translate(-4px, -2px); }
      80% { transform: translate(-4px, 2px); }
      100% { transform: translate(0); }
    }
    @keyframes shift {
      0%, 40%, 44%, 58%, 61%, 65%, 69%, 73%, 100% { transform: skewX(0deg); }
      41% { transform: skewX(10deg); }
      42% { transform: skewX(-10deg); }
      59% { transform: skewX(35deg) skewY(5deg); }
      60% { transform: skewX(-35deg) skewY(-5deg); }
      63% { transform: skewX(10deg) skewY(-1deg); }
      70% { transform: skewX(-30deg) skewY(-10deg); }
      71% { transform: skewX(5deg) skewY(2deg); }
    }

    /* Flicker */
    .flicker {
      animation: flicker 5s infinite;
    }
    @keyframes flicker {
      0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% { opacity: 1; }
      20%, 21.999%, 63%, 63.999%, 65%, 69.999% { opacity: 0.3; }
    }

    /* Cursor blink */
    .cursor-blink::after {
      content: '█';
      animation: blink 1s step-end infinite;
      color: #00FF41;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Button hover */
    .btn-hack {
      position: relative; overflow: hidden; transition: all 0.3s;
    }
    .btn-hack::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,255,65,0.15), transparent);
      transition: left 0.5s;
    }
    .btn-hack:hover::before { left: 100%; }
    .btn-hack:hover {
      text-shadow: 2px 0 #FF00FF, -2px 0 #00FFFF;
      box-shadow: 0 0 25px rgba(0,255,65,0.4), inset 0 0 25px rgba(0,255,65,0.1);
    }

    /* Log lines animation */
    .log-line {
      opacity: 0;
      animation: fadeIn 0.3s forwards;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Canvas */
    #matrix-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.15;
    }
  </style>
</head>
<body class="scanlines">
  <canvas id="matrix-bg"></canvas>

  <div class="relative z-10 flex items-center justify-center min-h-screen px-4">
    <div class="text-center max-w-2xl w-full">

      <!-- 404 number -->
      <div class="mb-6">
        <h1 class="font-cyber text-[8rem] sm:text-[12rem] md:text-[14rem] font-black leading-none text-hax-red glitch-404 flicker" style="text-shadow: 0 0 40px rgba(255,0,51,0.5), 0 0 120px rgba(255,0,51,0.15);">
          404
        </h1>
      </div>

      <!-- Error title -->
      <h2 class="font-cyber text-xl sm:text-2xl md:text-3xl text-hax-green tracking-[0.3em] mb-4" style="text-shadow: 0 0 10px rgba(0,255,65,0.5);">
        ACCESS DENIED
      </h2>

      <!-- Terminal log -->
      <div class="bg-black/70 border border-hax-green/20 p-4 sm:p-6 text-left mb-8 mx-auto max-w-lg relative" style="border-radius: 4px;">
        <div class="absolute top-2 left-3 flex gap-1.5">
          <span class="w-2.5 h-2.5 rounded-full bg-hax-red/80 inline-block"></span>
          <span class="w-2.5 h-2.5 rounded-full bg-yellow-500/60 inline-block"></span>
          <span class="w-2.5 h-2.5 rounded-full bg-hax-green/60 inline-block"></span>
        </div>
        <div class="pt-4 font-terminal text-sm sm:text-base" id="terminal-log"></div>
      </div>

      <!-- Countdown redirect -->
      <div class="mb-6">
        <div class="bg-black/70 border border-hax-red/30 px-6 py-4 inline-block" style="border-radius:4px;">
          <p class="font-terminal text-hax-red text-lg sm:text-xl">
            [AUTO-REDIRECT] Kembali ke base dalam <span id="countdown" class="text-white font-bold text-2xl">5</span> detik...
          </p>
          <div class="w-full bg-gray-800 h-1.5 mt-3 rounded overflow-hidden">
            <div id="progress-bar" class="h-full bg-hax-red transition-all duration-1000" style="width:0%"></div>
          </div>
        </div>
      </div>

      <!-- Message -->
      <p class="font-terminal text-gray-500 text-base sm:text-lg mb-8">
        Halaman yang kamu cari tidak ada di server ini.<br>
        <span class="text-gray-600">Mungkin sudah dihapus, dipindahkan, atau memang tidak pernah ada.</span>
      </p>

      <!-- Buttons -->
      <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
        <a href="/" class="btn-hack px-8 py-4 border-2 border-hax-green text-hax-green font-terminal text-lg sm:text-xl tracking-widest hover:bg-hax-green/10 transition-all">
          &gt; KEMBALI KE BASE
        </a>
        <button onclick="history.back()" class="btn-hack px-8 py-4 border-2 border-hax-cyan/50 text-hax-cyan font-terminal text-lg sm:text-xl tracking-widest hover:bg-hax-cyan/10 transition-all">
          &lt; GO BACK
        </button>
      </div>

      <!-- Footer -->
      <p class="font-terminal text-gray-800 text-xs mt-12 tracking-wider">
        [ INDOHAXSEC.ONE ] &mdash; Stay Anonymous &bull; No Logs &bull; No Compromise
      </p>
    </div>
  </div>

  <script>
    // Terminal typing effect
    (function() {
      const log = document.getElementById('terminal-log');
      const path = window.location.href;
      const lines = [
        { text: '$ curl -I ' + path, color: 'text-gray-500', delay: 0 },
        { text: 'Connecting to indohaxsec.one...', color: 'text-gray-600', delay: 400 },
        { text: 'HTTP/1.1 404 Not Found', color: 'text-hax-red', delay: 900 },
        { text: 'Server: IndoHaxSec/1.0', color: 'text-gray-600', delay: 1200 },
        { text: 'X-Powered-By: Digital Resistance', color: 'text-gray-600', delay: 1500 },
        { text: '[ERROR] Target not found in filesystem', color: 'text-hax-red', delay: 2000 },
        { text: '[WARN] Unauthorized route detected', color: 'text-hax-magenta', delay: 2600 },
        { text: '[SYS] Logging intrusion attempt...', color: 'text-yellow-500', delay: 3100 },
        { text: '[SYS] Initiating redirect sequence...', color: 'text-hax-green', delay: 3600 },
        { text: '[SYS] Redirecting operative to base...', color: 'text-hax-green', delay: 4200, cursor: true },
      ];

      lines.forEach(function(line) {
        setTimeout(function() {
          const p = document.createElement('p');
          p.className = line.color + ' mb-1';
          // Type character by character
          let i = 0;
          const span = document.createElement('span');
          p.appendChild(span);
          if (line.cursor) {
            const cur = document.createElement('span');
            cur.className = 'cursor-blink';
            p.appendChild(cur);
          }
          log.appendChild(p);
          log.scrollTop = log.scrollHeight;
          function typeChar() {
            if (i < line.text.length) {
              span.textContent += line.text[i];
              i++;
              setTimeout(typeChar, 12 + Math.random() * 18);
            }
          }
          typeChar();
        }, line.delay);
      });
    })();

    // Countdown + auto redirect
    (function() {
      var seconds = 5;
      var countdownEl = document.getElementById('countdown');
      var progressBar = document.getElementById('progress-bar');
      
      // Start progress bar
      setTimeout(function() { progressBar.style.width = '20%'; }, 100);

      var interval = setInterval(function() {
        seconds--;
        countdownEl.textContent = seconds;
        progressBar.style.width = ((5 - seconds) / 5 * 100) + '%';
        if (seconds <= 0) {
          clearInterval(interval);
          countdownEl.textContent = '0';
          window.location.href = '/';
        }
      }, 1000);
    })();

    // Matrix rain background
    (function() {
      const c = document.getElementById('matrix-bg');
      const ctx = c.getContext('2d');
      function resize() { c.width = c.offsetWidth; c.height = c.offsetHeight; }
      resize();
      window.addEventListener('resize', resize);

      const chars = '01アイウエオカキクケコ<>{}[];!@#$%';
      const fs = 14;
      let cols = Math.floor(c.width / fs);
      let drops = new Array(cols).fill(1);

      window.addEventListener('resize', function() {
        cols = Math.floor(c.width / fs);
        drops = new Array(cols).fill(1);
      });

      setInterval(function() {
        ctx.fillStyle = 'rgba(5,5,5,0.06)';
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.fillStyle = '#FF0033';
        ctx.font = fs + 'px monospace';
        for (let i = 0; i < drops.length; i++) {
          const t = chars[Math.floor(Math.random() * chars.length)];
          ctx.globalAlpha = Math.random() * 0.4 + 0.1;
          ctx.fillText(t, i * fs, drops[i] * fs);
          ctx.globalAlpha = 1;
          if (drops[i] * fs > c.height && Math.random() > 0.975) drops[i] = 0;
          drops[i]++;
        }
      }, 55);
    })();
  </script>
</body>
</html>
